name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install (frozen lockfile)
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Unlike the Vitest suite (§2.8: no live network in CI), this E2E run
      # deliberately hits the real Cloudflare endpoints — it is the only
      # thing that proves the Worker + XHR/fetch transports actually work
      # in a browser, which is precisely where the Node-only suite was
      # blind. If Cloudflare or the runner's egress is flaky this can fail
      # for reasons unrelated to the change; retries are configured in
      # playwright.config.ts rather than the run being made non-blocking.
      - name: E2E (real browser, real network)
        run: npm run test:e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      # Testcontainers-backed integration tests join this pipeline once
      # Phase 4 (persistence) lands a real suite for them.
